name: Consumer Affairs VIC Monitor

on:
# 🔴 NEW: This allows the iPhone/Orchestrator to trigger this repo
  repository_dispatch:
    types: [trigger-all-repos]
    
  schedule:
    - cron: '0 20 * * 0'   # Monday 7 AM AEDT
    - cron: '0 20 * * 2'   # Wednesday 7 AM AEDT
  workflow_dispatch:        # Manual trigger button

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      # Added lxml here so the script can parse the RSS feeds
      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml
        
      - name: Run Scraper
        run: python monitor.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
